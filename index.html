<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Corner Fuel Auto Sales | Get Approved Today</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin: 20px 10px;
      padding: 12px 20px;
      background: gold;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
    }

    .section {
      padding: 40px 20px;
    }

    form {
      max-width: 400px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, select {
      padding: 12px;
      border-radius: 6px;
      border: none;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      color: #888;
    }
  </style>
</head>

<body>

<header>
  <h1>Corner Fuel Auto Sales</h1>
  <p>Bad Credit? No Problem. Get Approved & Drive Today.</p>

  <a href="#apply" class="btn">Apply Now</a>
  <a href="tel:6723806005" class="btn">Call Now</a>
</header>

<section class="section">
  <h2>We Help With</h2>
  <p>✔ Bad Credit</p>
  <p>✔ No Credit</p>
  <p>✔ Collections / Repo</p>
  <p>✔ New to Canada</p>
</section>

<section class="section" id="apply">
  <h2>Get Approved</h2>

  <form action="https://formsubmit.co/deepankarwalia7@gmail.com" method="POST">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <input type="email" name="email" placeholder="Email Address" required>
    
    <input type="text" name="income" placeholder="Monthly Income" required>

    <select name="credit">
      <option value="">Credit Score</option>
      <option>700+</option>
      <option>600-699</option>
      <option>500-599</option>
      <option>Below 500</option>
      <option>Not Sure</option>
    </select>

    <select name="vehicle">
      <option value="">Vehicle Type</option>
      <option>Car</option>
      <option>SUV</option>
      <option>Truck</option>
    </select>

    <button class="btn" type="submit">Submit Application</button>
  </form>
</section>

<footer>
  © 2026 Corner Fuel Auto Sales. All rights reserved.
</footer>

</body>
</html>
